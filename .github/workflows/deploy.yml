name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  schedule:
    - cron: '17 6 * * *'  # 14:17 Taiwan time (UTC+8 = 06:17 UTC)
  workflow_dispatch:       # Manual trigger + 由 deploy-showcase skill 觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build index from Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_DRIVE_SA_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
